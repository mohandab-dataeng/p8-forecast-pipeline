services:

# 1. PostgresSQL
    p8_pg:
        image: postgres:16
        container_name: p8-postgres
        environment:
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
        ports:
            - "5433:5432"
        volumes:
            - p8_pg_data:/var/lib/postgresql/data
        networks :
            - forecast_network

# 2. dbt
    dbt: 
        build: ./dbt_pipeline
        container_name: p8-dbt
        depends_on: 
            - p8_pg
        environment:
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
        volumes:
            - ./dbt_pipeline:/dbt 
        working_dir: /dbt
        networks:
            - forecast_network
        entrypoint: ["tail", "-f", "/dev/null"]

# Volumes 
volumes:
  p8_pg_data:

# Réseau
networks:
    forecast_network:
        name: forecast-network