# ----- Profil -----
profil_meteoforecast:
  
# --- Environement de travail ---

  target: dev
  
# --- Configuration de l'environement de travail ---  

  outputs:
    dev:
      type: postgres
      host: p8-postgres
      port: 5432
      user: "{{ env_var('POSTGRES_USER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      dbname: "{{ env_var('POSTGRES_DB') }}"
      schema: raw
      threads: 4
